interface:
  display_name: "Bootstrap Python MCP Service"
  short_description: "Bootstrap uv FastMCP projects and workspaces."
  default_prompt: "Use $bootstrap-python-mcp-service to create a uv FastMCP project or workspace, optionally apply layered customization profiles, run the canonical shell entrypoint, and optionally generate an OpenAPI or FastAPI mapping report with uv run python."

dependencies:
  tools:
    - type: "mcp"
      value: "fastmcp_docs"
      description: "FastMCP documentation search"

policy:
  allow_implicit_invocation: true
